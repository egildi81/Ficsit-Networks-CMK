<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FN-CMK Monitor — Satisfactory</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-x: hidden; }
body { background: #080808; color: #ddd; font-family: 'Segoe UI', 'Consolas', monospace; min-height: 100vh; overflow-x: hidden; max-width: 100vw; }

/* ── HEADER ── */
header {
    background: #111; padding: 14px 24px 0;
    border-bottom: 2px solid #1e1e1e; position: sticky; top: 0; z-index: 10;
}
.header-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
}
header h1 { color: #ff8800; font-size: 1.25em; letter-spacing: 3px; font-weight: 700; }
#status { font-size: 0.82em; color: #777; transition: color .3s; }
#status.ok      { color: #33cc55; }
#status.late    { color: #ff4444; }
#status.err     { color: #ff4444; }

/* ── SECTIONS (niveau supérieur) ── */
.sections { display: flex; gap: 2px; margin-bottom: 6px; }
.section-btn {
    padding: 6px 18px; cursor: pointer; font-size: 0.78em; font-weight: 700;
    letter-spacing: 1.5px; border-radius: 4px 4px 0 0;
    color: #555; background: transparent; border: none;
    border-bottom: 3px solid transparent; transition: color .15s, border-color .15s;
    user-select: none; text-transform: uppercase;
}
.section-btn:hover { color: #999; }
.section-btn.active { color: #ff8800; border-bottom: 3px solid #ff8800; }

/* ── ONGLETS (niveau secondaire, sous TRAINS) ── */
.tabs { display: flex; gap: 4px; }
.tab {
    padding: 8px 20px; cursor: pointer; font-size: 0.82em; font-weight: 600;
    letter-spacing: 1px; border-radius: 6px 6px 0 0;
    color: #888; background: transparent; border: none;
    border-bottom: 2px solid transparent; transition: color .15s, border-color .15s;
    user-select: none;
}
.tab:hover { color: #bbb; }
.tab.active { color: #ff8800; border-bottom: 2px solid #ff8800; }

/* ── PAGES ── */
.page { display: none; padding: 16px; }
.page.active { display: block; }

/* ── COLONNES TRAINS ── */
.columns {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
}
.col { background: #111; border-radius: 8px; overflow: hidden; }
.col-header {
    padding: 12px 16px; font-size: 0.82em; font-weight: 700;
    letter-spacing: 1.5px; display: flex; justify-content: space-between; align-items: center;
}
.col-label-icon { display: none; font-size: 1.3em; line-height: 1; }

@media (max-width: 600px) {
    /* Header */
    header { padding: 10px 12px 0; }
    header h1 { font-size: 1em; letter-spacing: 1px; }
    .tabs { gap: 2px; }
    .tab { padding: 8px 12px; letter-spacing: 0; font-size: 0.76em; }

    /* Pages */
    .page { padding: 8px; }

    /* Colonnes trains → empilées */
    .columns { grid-template-columns: 1fr; gap: 8px; }
    .col-header { padding: 10px 14px; justify-content: space-between; }
    .col-label-full { display: inline; }
    .col-label-icon { display: none; }
    .train-row { padding: 7px 10px; }
    .train-name { font-size: 0.85em; }
    .train-sub  { font-size: 0.72em; }

    /* Historique */
    .seg-stats, .seg-inv { white-space: normal; word-break: break-word; }
}
.col-header.moving  { background:#091209; color:#33ff55; border-bottom:2px solid #33ff55; }
.col-header.docked  { background:#09090f; color:#4499ff; border-bottom:2px solid #4499ff; }
.col-header.stopped { background:#120909; color:#ff4444; border-bottom:2px solid #ff4444; }
.badge {
    background: rgba(255,255,255,0.08); border-radius: 12px;
    padding: 2px 10px; font-size: 0.9em;
}
.train-row {
    padding: 9px 14px; border-bottom: 1px solid #161616;
    display: flex; flex-direction: column; gap: 3px;
}
.train-row:last-child { border-bottom: none; }
.train-name { color: #fff; font-size: 0.9em; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.train-sub  { color: #999; font-size: 0.76em; }
.train-sub span { margin-right: 10px; }
.spd-fast { color: #33ff55; }
.spd-slow { color: #ffff33; }
.spd-none { color: #ff4444; }
.clr-blue { color: #4499ff; }
.empty-row { padding: 12px 14px; color: #666; font-size: 0.8em; font-style: italic; }
.dot { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 7px; vertical-align: middle; flex-shrink: 0; }
.dot-fast    { background: #33ff55; }
.dot-slow    { background: #ffff33; }
.dot-stopped { background: #ff4444; }
.dot-docked  { background: #4499ff; }

/* ── HISTORIQUE ── */
.train-card { background: #111; border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
.train-card-header {
    padding: 10px 16px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    background: #141414; user-select: none; transition: background .15s;
}
.train-card-header:hover { background: #1a1a1a; }
.train-card-header .tname { color: #ccc; font-size: 0.88em; font-weight: 600; }
.train-card-header .tmeta { color: #777; font-size: 0.78em; }
.train-card-header .arrow { color: #777; font-size: 0.8em; transition: transform .2s; }
.train-card-header.open .arrow { transform: rotate(90deg); }
.segments { display: none; padding: 8px; }
.segments.open { display: block; }
.segment {
    margin-bottom: 6px; padding: 8px 12px;
    background: #0c0c0c; border-radius: 6px; border-left: 3px solid #2255aa;
}
.seg-title { color: #4499ff; font-size: 0.8em; font-weight: 600; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.seg-stats { color: #999; font-size: 0.74em; }
.seg-inv   { color: #aaa; font-size: 0.74em; margin-top: 4px; }
.seg-inv span { margin-right: 10px; }

/* ── STATISTIQUES ── */
/* auto-fit : passe automatiquement en colonne unique quand < 260px par bloc */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 12px; margin-bottom: 16px;
}
.stats-section {
    background: #111; border-radius: 8px; padding: 18px 20px;
    border: 1px solid #1a1a1a;
    display: flex; flex-direction: column; gap: 0;
}
.stats-section-title {
    color: #ff8800; font-size: 0.78em; letter-spacing: 1.5px; font-weight: 700;
    margin-bottom: 14px; border-bottom: 1px solid #1e1e1e; padding-bottom: 8px;
}
.stats-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.stats-label { color: #888; font-size: 0.82em; margin-bottom: 2px; }
.stats-val { font-weight: 700; }
.stats-bigval { font-size: 1.6em; font-weight: 700; color: #eee; }
.stats-sub { font-size: 0.6em; color: #888; font-weight: 400; display: block; margin-top: 2px; }
.stats-bar-bg { background: #0d0d0d; height: 8px; border-radius: 4px; overflow: hidden; margin: 6px 0 16px; }
.stats-bar { height: 100%; border-radius: 4px; transition: width .5s; width: 0%; }
.stats-score { font-size: 4em; font-weight: 700; line-height: 1; display: inline; }
.stats-score-denom { font-size: 1.2em; color: #666; }
.stats-uptime { margin-top: 16px; color: #666; font-size: 0.72em; }
.stats-inv-row { display: flex; gap: 12px; margin-top: 12px; }
.stats-inv-cell { flex: 1; min-width: 0; }
.clr-orange { color: #ff8800; }
.stats-hist-header { color: #ff8800; font-size: 0.78em; letter-spacing: 1.5px; font-weight: 700; margin: 4px 0 8px; }
.clr-green  { color: #22ee22; }
.clr-yellow { color: #eeee22; }
.clr-red    { color: #ee3333; }
.clr-blue   { color: #3399ff; }
.bar-green  { background: #22ee22; }
.bar-yellow { background: #eeee22; }
.bar-red    { background: #ee3333; }

/* ── STOCKAGE ── */
.stock-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
}
.stock-card { background: #111; border-radius: 8px; overflow: hidden; }
.stock-card-header {
    padding: 12px 16px; font-size: 0.82em; font-weight: 700; letter-spacing: 1.5px;
    display: flex; justify-content: space-between; align-items: center;
    background: #0f0c08; color: #ff8800; border-bottom: 2px solid #ff8800;
}
.stock-body { padding: 12px 14px; }
.stock-bar-bg { background: #0d0d0d; height: 6px; border-radius: 3px; overflow: hidden; margin: 0 0 10px; }
.stock-bar { height: 100%; border-radius: 3px; transition: width .5s; }
.stock-meta { color: #888; font-size: 0.76em; margin-bottom: 10px; }
.stock-items { display: flex; flex-direction: column; gap: 4px; }
.stock-item-row {
    padding: 5px 0; border-bottom: 1px solid #161616;
    display: flex; justify-content: space-between; font-size: 0.8em;
}
.stock-item-row:last-child { border-bottom: none; }
.stock-item-name { color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%; }
.stock-item-val { color: #fff; font-weight: 600; flex-shrink: 0; }
.stock-item-pct { color: #666; font-weight: 400; margin-left: 6px; }
.stock-empty { color: #666; font-size: 0.82em; font-style: italic; padding: 6px 0; }
.stock-stale { opacity: 0.45; }

/* ── FOOTER ── */
#footer { position: fixed; bottom: 8px; right: 14px; color: #282828; font-size: 0.72em; }
</style>
</head>
<body>

<header>
    <div class="header-top">
        <h1>FN-CMK MONITOR</h1>
        <span id="status">Connexion...</span>
    </div>
    <div class="sections">
        <button class="section-btn active" onclick="switchSection('trains', this)">TRAINS</button>
        <button class="section-btn" onclick="switchSection('stockage', this)">STOCKAGE</button>
    </div>
    <nav class="tabs" id="trains-tabs">
        <button class="tab active" onclick="switchTab('monitor', this)">EN DIRECT</button>
        <button class="tab" onclick="switchTab('history', this)">HISTORIQUE</button>
        <button class="tab" onclick="switchTab('stats', this)">STATISTIQUES</button>
    </nav>
</header>

<!-- ── ONGLET EN DIRECT ── -->
<div id="page-monitor" class="page active">
    <div class="columns">
        <div class="col">
            <div class="col-header stopped"><span class="col-label-full">À L'ARRÊT</span><span class="col-label-icon">🔴</span><span class="badge" id="cnt-stopped">0</span></div>
            <div id="col-stopped"></div>
        </div>
        <div class="col">
            <div class="col-header moving"><span class="col-label-full">EN MOUVEMENT</span><span class="col-label-icon">🟢</span><span class="badge" id="cnt-moving">0</span></div>
            <div id="col-moving"></div>
        </div>
        <div class="col">
            <div class="col-header docked"><span class="col-label-full">À QUAI</span><span class="col-label-icon">🔵</span><span class="badge" id="cnt-docked">0</span></div>
            <div id="col-docked"></div>
        </div>
    </div>
</div>

<!-- ── ONGLET HISTORIQUE ── -->
<div id="page-history" class="page">
    <div id="trips-list"></div>
</div>

<!-- ── ONGLET STATISTIQUES ── -->
<div id="page-stats" class="page">
    <div class="stats-grid">
        <!-- Col 1 : TRAINS -->
        <div class="stats-section">
            <div class="stats-section-title">TRAINS</div>
            <div class="stats-row"><span class="stats-label">En mouvement</span><span class="stats-val clr-green" id="st-moving">—</span></div>
            <div class="stats-row"><span class="stats-label">À quai</span><span class="stats-val clr-blue" id="st-docked">—</span></div>
            <div class="stats-row"><span class="stats-label">À l'arrêt</span><span class="stats-val clr-red" id="st-stopped">—</span></div>
            <div class="stats-row" style="border-top:1px solid #1e1e1e;padding-top:8px;margin-top:4px">
                <span class="stats-label">Total</span><span class="stats-val" id="st-total">—</span>
            </div>
        </div>
        <!-- Col 2 : PERFORMANCE -->
        <div class="stats-section">
            <div class="stats-section-title" id="st-perf-title">PERFORMANCE</div>
            <div class="stats-label">Vitesse moy (trains en mvt)</div>
            <div class="stats-bigval" id="st-speed">—</div>
            <div class="stats-bar-bg"><div class="stats-bar" id="st-speed-bar"></div></div>
            <div class="stats-label">Trajet moyen</div>
            <div class="stats-bigval clr-yellow" id="st-dur">N/A</div>
            <div class="stats-inv-row">
                <div class="stats-inv-cell">
                    <div class="stats-label">Moy / trajet</div>
                    <div class="stats-bigval clr-yellow" id="st-inv">—</div>
                </div>
                <div class="stats-inv-cell">
                    <div class="stats-label">Total circ.</div>
                    <div class="stats-bigval clr-orange" id="st-inv-total">—</div>
                </div>
            </div>
        </div>
        <!-- Col 3 : SCORE -->
        <div class="stats-section">
            <div class="stats-section-title">SCORE RÉSEAU</div>
            <div style="display:flex;align-items:baseline;gap:6px;white-space:nowrap"><span class="stats-score" id="st-score">—</span><span class="stats-score-denom">/100</span></div>
            <div class="stats-label" style="margin-top:18px">Confiance</div>
            <div class="stats-bigval" id="st-conf">—</div>
            <div class="stats-uptime" id="st-uptime">UP: —</div>
        </div>
    </div>
    <div class="stats-hist-header">HISTORIQUE <span id="st-hist-cnt" style="color:#444;font-weight:400;letter-spacing:0;font-size:1.2em"></span></div>
    <canvas id="st-hist-canvas" height="110" style="width:100%;display:block;border-radius:6px"></canvas>
</div>

<!-- ── SECTION STOCKAGE ── -->
<div id="page-stockage" class="page">
    <div id="stockage-grid" class="stock-grid"></div>
</div>

<div id="footer">—</div>

<script>
// ── Navigation sections (TRAINS / STOCKAGE) ──────────────────
const _trainPages = ['page-monitor', 'page-history', 'page-stats'];
let _lastTrainPage = 'page-monitor';

function switchSection(name, btn) {
    document.querySelectorAll('.section-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const trainsTabs = document.getElementById('trains-tabs');
    if (name === 'trains') {
        trainsTabs.style.display = '';
        document.getElementById('page-stockage').classList.remove('active');
        document.getElementById(_lastTrainPage).classList.add('active');
    } else {
        trainsTabs.style.display = 'none';
        _trainPages.forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById('page-stockage').classList.add('active');
    }
}

// ── Navigation onglets (sous TRAINS) ─────────────────────────
function switchTab(name, btn) {
    _trainPages.forEach(id => document.getElementById(id).classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    _lastTrainPage = 'page-' + name;
    document.getElementById(_lastTrainPage).classList.add('active');
    btn.classList.add('active');
}

// ── Utilitaires ──────────────────────────────────────────────
function fmt(sec) {
    sec = Math.max(0, Math.round(sec));
    const m = Math.floor(sec / 60), s = sec % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
}

function fmtNumMobile(n) {
    n = Math.floor(n || 0);
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 10000)   return Math.floor(n / 1000) + 'k';
    if (n >= 1000)    return (n / 1000).toFixed(1) + 'k';
    return String(n);
}
function fmtUptime(sec) {
    sec = Math.floor(sec || 0);
    const h = Math.floor(sec / 3600);
    const m = Math.floor(sec / 60) % 60;
    const s = sec % 60;
    return `${h}h${String(m).padStart(2,'0')}m${String(s).padStart(2,'0')}s`;
}

function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Rendu colonnes temps réel ────────────────────────────────
function renderTrains(trains) {
    const groups = { moving: [], docked: [], stopped: [] };
    trains.forEach(t => (groups[t.status] || groups.stopped).push(t));
    groups.moving.sort((a, b) => a.speed - b.speed);  // plus lent en haut

    document.getElementById('cnt-moving').textContent  = groups.moving.length;
    document.getElementById('cnt-docked').textContent  = groups.docked.length;
    document.getElementById('cnt-stopped').textContent = groups.stopped.length;

    const empty = '<div class="empty-row">Aucun</div>';

    document.getElementById('col-moving').innerHTML = groups.moving.length
        ? groups.moving.map(t => `
            <div class="train-row">
                <div class="train-name">
                    <span class="dot ${t.speed > 100 ? 'dot-fast' : 'dot-slow'}"></span>
                    ${esc(t.name)}
                </div>
                <div class="train-sub">
                    <span class="${t.speed > 100 ? 'spd-fast' : 'spd-slow'}">${t.speed} km/h</span>
                    <span>→ ${esc(t.station)}</span>
                    <span>${t.wagons} wagon${t.wagons > 1 ? 's' : ''}</span>
                </div>
            </div>`).join('') : empty;

    document.getElementById('col-docked').innerHTML = groups.docked.length
        ? groups.docked.map(t => `
            <div class="train-row">
                <div class="train-name">
                    <span class="dot dot-docked"></span>
                    ${esc(t.name)}
                </div>
                <div class="train-sub">
                    <span class="clr-blue">→ ${esc(t.station)}</span>
                    <span>${t.wagons} wagon${t.wagons > 1 ? 's' : ''}</span>
                </div>
            </div>`).join('') : empty;

    document.getElementById('col-stopped').innerHTML = groups.stopped.length
        ? groups.stopped.map(t => `
            <div class="train-row">
                <div class="train-name">
                    <span class="dot dot-stopped"></span>
                    ${esc(t.name)}
                </div>
                <div class="train-sub">
                    <span class="spd-none">Arrêté</span>
                    <span>${esc(t.station)}</span>
                    <span>${t.wagons} wagon${t.wagons > 1 ? 's' : ''}</span>
                </div>
            </div>`).join('') : empty;

}

// ── Rendu historique ─────────────────────────────────────────
const openCards = new Set();

function renderTrips(trips) {
    const container = document.getElementById('trips-list');
    const entries = Object.entries(trips || {});
    if (!entries.length) {
        container.innerHTML = '<div class="empty-row">Aucun trajet enregistré</div>';
        return;
    }

    let totalTrips = 0;
    let html = '';

    for (const [trainName, segs] of entries) {
        const isOpen = openCards.has(trainName);
        const segEntries = Object.entries(segs || {});
        let segHtml = '';

        for (const [seg, tripArr] of segEntries) {
            if (!tripArr || !tripArr.length) continue;
            totalTrips += tripArr.length;
            const durations = tripArr.map(t => Number(t.duration));
            const mn = Math.min(...durations), mx = Math.max(...durations);
            const avg = Math.floor(durations.reduce((a, b) => a + b, 0) / durations.length);
            const last = tripArr[0];
            const invParts = last.inv ? Object.entries(last.inv).map(([k, v]) => `<span>${esc(k)} ×${v}</span>`).join('') : '';

            segHtml += `
                <div class="segment">
                    <div class="seg-title">${esc(seg)} &nbsp;(${tripArr.length} trajet${tripArr.length > 1 ? 's' : ''})</div>
                    <div class="seg-stats">min ${fmt(mn)} · moy ${fmt(avg)} · max ${fmt(mx)} · ${last.wagons || '?'} wagon${last.wagons > 1 ? 's' : ''}</div>
                    ${invParts ? `<div class="seg-inv">${invParts}</div>` : ''}
                </div>`;
        }

        html += `
            <div class="train-card">
                <div class="train-card-header ${isOpen ? 'open' : ''}" onclick="toggleCard(this,'${esc(trainName).replace(/'/g,"\\'")}')">
                    <span class="tname">${esc(trainName)}</span>
                    <span class="tmeta">${segEntries.length} segment${segEntries.length > 1 ? 's' : ''}</span>
                    <span class="arrow">▶</span>
                </div>
                <div class="segments ${isOpen ? 'open' : ''}">${segHtml || '<div class="empty-row">Aucun segment</div>'}</div>
            </div>`;
    }

    container.innerHTML = html;
}

function toggleCard(el, name) {
    const seg = el.nextElementSibling;
    const open = !seg.classList.contains('open');
    seg.classList.toggle('open', open);
    el.classList.toggle('open', open);
    open ? openCards.add(name) : openCards.delete(name);
}

// ── Stats réseau — données calculées par LOGGER, affichage uniquement ────────
function renderStats(trains, stats, updatedAt) {
    const s = stats || {};

    // Trains (compteurs depuis LOGGER via stats)
    document.getElementById('st-moving').textContent  = s.movingCnt  ?? '—';
    document.getElementById('st-docked').textContent  = s.dockedCnt  ?? '—';
    document.getElementById('st-stopped').textContent = s.stoppedCnt ?? '—';
    document.getElementById('st-total').textContent   = s.totalCnt   ?? '—';

    // Performance
    const avgSpeed = s.avgSpeed || 0;
    const durCnt   = s.durCnt   || 0;
    const avgDur   = s.avgDur   || 0;
    const avgInv   = s.avgInv   || 0;

    document.getElementById('st-perf-title').textContent = 'PERFORMANCE' + (durCnt > 0 ? ' (' + durCnt + ' trajets)' : '');

    const speedEl = document.getElementById('st-speed');
    speedEl.textContent = avgSpeed > 0 ? avgSpeed + ' km/h' : '—';
    speedEl.className = 'stats-bigval ' + (avgSpeed > 150 ? 'clr-green' : avgSpeed > 80 ? 'clr-yellow' : 'clr-red');
    const barEl = document.getElementById('st-speed-bar');
    barEl.style.width = Math.min(avgSpeed / 200, 1) * 100 + '%';
    barEl.className = 'stats-bar ' + (avgSpeed > 150 ? 'bar-green' : avgSpeed > 80 ? 'bar-yellow' : 'bar-red');

    document.getElementById('st-dur').textContent = durCnt > 0 ? fmt(avgDur) : 'N/A';
    const isMobile = window.innerWidth < 600;
    const fmtI = n => isMobile ? fmtNumMobile(n) : String(n);
    document.getElementById('st-inv').textContent = avgInv > 0 ? fmtI(avgInv) + ' items' : '—';
    const totalInv = s.totalInv || 0;
    document.getElementById('st-inv-total').textContent = totalInv > 0 ? fmtI(totalInv) + ' items' : '—';

    // Score (calculé par LOGGER)
    const scoreHistory = s.scoreHistory || [];
    const score = scoreHistory.length > 0 ? scoreHistory[scoreHistory.length - 1] : (s.score ?? null);
    const scoreEl = document.getElementById('st-score');
    scoreEl.textContent = score !== null ? score : '—';
    scoreEl.className = 'stats-score ' + (score >= 80 ? 'clr-green' : score >= 60 ? 'clr-yellow' : score !== null ? 'clr-red' : '');

    // Confiance (calculée par LOGGER)
    const confLabels = {
        'HAUTE': 'clr-green', 'BONNE': 'clr-green',
        'FAIBLE': 'clr-yellow', 'INEXISTANTE': 'clr-red'
    };
    const confEl = document.getElementById('st-conf');
    confEl.textContent = s.conf || 'INCONNUE';
    confEl.className = 'stats-bigval ' + (confLabels[s.conf] || '');

    // Uptime (depuis LOGGER)
    document.getElementById('st-uptime').textContent = 'UP: ' + fmtUptime(s.uptime);

    // Graphique historique (depuis LOGGER)
    document.getElementById('st-hist-cnt').textContent = `(${scoreHistory.length} mesures)`;
    const canvas = document.getElementById('st-hist-canvas');
    canvas.width = canvas.offsetWidth || 900;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    if (!scoreHistory.length) {
        ctx.fillStyle = '#333'; ctx.font = '13px monospace';
        ctx.fillText('En attente des données...', 16, h / 2 + 5);
    } else {
        const colW = Math.floor((w - 32) / scoreHistory.length);
        scoreHistory.forEach((sc, i) => {
            const bh = Math.floor((h - 4) * sc / 100);
            const bx = 16 + i * colW;
            ctx.fillStyle = '#0d0d0d';
            ctx.fillRect(bx, 0, colW - 2, h - 4);
            if (bh > 0) {
                ctx.fillStyle = sc >= 80 ? '#22cc22' : sc >= 60 ? '#cccc22' : '#cc2222';
                ctx.fillRect(bx, h - 4 - bh, colW - 2, bh);
            }
        });
    }
}

// ── Rendu stockage ───────────────────────────────────────────
function renderStockage(stockage) {
    const grid = document.getElementById('stockage-grid');
    if (!grid) return;
    if (!stockage || !stockage.length) {
        grid.innerHTML = '<div class="stock-empty">Aucune zone de stockage connectée</div>';
        return;
    }
    const now = Date.now() / 1000;
    grid.innerHTML = stockage.map(z => {
        const stale = z.ts && (now - z.ts) > 60;
        const fill = z.fillRate ?? 0;
        const fillColor = fill >= 80 ? '#ee3333' : fill >= 50 ? '#eeee22' : '#22ee22';
        const topItems = z.topItems || [];
        const itemsHtml = topItems.length
            ? topItems.map(it => `<div class="stock-item-row"><span class="stock-item-name">${esc(it.name)}</span><span class="stock-item-val">${it.count}<span class="stock-item-pct">${it.pct}%</span></span></div>`).join('')
            : '<div class="stock-empty">Aucun item</div>';
        return `
            <div class="stock-card${stale ? ' stock-stale' : ''}">
                <div class="stock-card-header">
                    <span>${esc(z.zone || '?')}</span>
                    <span class="badge" style="color:${fillColor}">${fill}%</span>
                </div>
                <div class="stock-body">
                    <div class="stock-bar-bg"><div class="stock-bar" style="width:${fill}%;background:${fillColor}"></div></div>
                    <div class="stock-meta">${z.slotsUsed ?? '?'} / ${z.slotsTotal ?? '?'} slots · ${z.totalItems ?? '?'} items</div>
                    <div class="stock-items">${itemsHtml}</div>
                </div>
            </div>`;
    }).join('');
}

// ── Boucle de rafraîchissement ───────────────────────────────
let errors = 0;

async function refresh() {
    try {
        const r = await fetch('/api/data');
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        errors = 0;

        const st = document.getElementById('status');
        if (!data.logger_updated_at) {
            st.textContent = '● En attente';
            st.className = '';
        } else {
            const ageSec = Math.round((Date.now() / 1000) - data.logger_updated_at);
            let ageStr = ageSec < 60 ? `${ageSec}s` : `${Math.floor(ageSec/60)}min${ageSec%60 ? ' '+ageSec%60+'s' : ''}`;
            if (ageSec <= 10) {
                st.textContent = `● En direct  (${ageStr})`;
                st.className = 'ok';
            } else if (ageSec <= 60) {
                st.textContent = `● Retard  (${ageStr})`;
                st.className = 'late';
            } else {
                st.textContent = `● Hors ligne  (${ageStr})`;
                st.className = 'err';
            }
        }

        renderTrains(data.trains || []);
        renderTrips(data.trips || {});
        renderStats(data.trains || [], data.stats || {}, data.logger_updated_at);
        renderStockage(data.stockage || []);

        document.getElementById('footer').textContent =
            'Dernière mise à jour : ' + new Date().toLocaleTimeString();

        if (data.error) console.warn('LOGGER:', data.error);
    } catch (e) {
        errors++;
        const st = document.getElementById('status');
        st.textContent = `⚠ Erreur serveur (${errors})`;
        st.className = 'err';
    }
}

refresh();
setInterval(refresh, 2000);
</script>
